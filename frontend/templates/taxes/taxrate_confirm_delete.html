{% extends "base.html" %}
{% block title %}Delete Tax Rate{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-trash me-2 text-danger"></i>Delete Tax Rate</h1>
</div>
<div class="card form-card" style="max-width:500px;">
  <div class="card-body">
    <p>Delete <strong>{{ object.name }}</strong> ({{ object.rate_percent|floatformat:2 }}%)?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger me-2">Yes, delete</button>
      <a href="{% url 'taxes:list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
