{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{% if object %}Edit Tax Rate{% else %}New Tax Rate{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{% if object %}<i class="bi bi-pencil me-2"></i>Edit Tax Rate{% else %}<i class="bi bi-percent me-2"></i>New Tax Rate{% endif %}</h1>
  <a href="{% url 'taxes:list' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>
<div class="form-card" style="max-width:500px;">
  {% crispy form %}
</div>
{% endblock %}
