{% extends "base.html" %}
{% block title %}Invoices{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-receipt me-2"></i>Invoices</h1>
  <a href="{% url 'invoicing:invoice_create' %}" class="btn btn-primary">
    <i class="bi bi-plus-lg me-1"></i>New Invoice
  </a>
</div>

<div class="card form-card mb-3">
  <div class="card-body py-2">
    <form class="d-flex gap-2 align-items-center"
          hx-get="{% url 'invoicing:invoice_list' %}"
          hx-target="#invoice-table"
          hx-trigger="change"
          hx-push-url="true">
      <label class="text-muted small me-1">Status:</label>
      {% for val, label in status_choices %}
      <div class="form-check form-check-inline mb-0">
        <input class="form-check-input" type="radio" name="status" id="s{{ val }}" value="{{ val }}"
               {% if request.GET.status == val %}checked{% endif %}>
        <label class="form-check-label small" for="s{{ val }}">{{ label }}</label>
      </div>
      {% endfor %}
      <div class="form-check form-check-inline mb-0">
        <input class="form-check-input" type="radio" name="status" id="sAll" value=""
               {% if not request.GET.status %}checked{% endif %}>
        <label class="form-check-label small" for="sAll">All</label>
      </div>
    </form>
  </div>
</div>

<div id="invoice-table">
  {% include "invoicing/partials/invoice_table.html" %}
</div>
{% endblock %}
