{% extends "base.html" %}
{% block title %}Delete Expense{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-trash me-2 text-danger"></i>Delete Expense</h1>
</div>
<div class="card form-card" style="max-width:500px;">
  <div class="card-body">
    <p>Are you sure you want to delete <strong>{{ object.description }}</strong> ({{ active_company.currency }} {{ object.amount|floatformat:2 }})?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger me-2">Yes, delete</button>
      <a href="{% url 'expenses:list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
