{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{% if object %}Edit Company{% else %}New Company{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{% if object %}<i class="bi bi-pencil me-2"></i>Edit {{ object.name }}{% else %}<i class="bi bi-building me-2"></i>New Company{% endif %}</h1>
  <a href="{% url 'accounts:company_list' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>
<div class="form-card" style="max-width:700px;">
  {% crispy form %}
</div>
{% endblock %}
