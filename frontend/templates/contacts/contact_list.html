{% extends "base.html" %}
{% block title %}Contacts{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-people me-2"></i>Contacts</h1>
  <a href="{% url 'contacts:create' %}" class="btn btn-primary">
    <i class="bi bi-plus-lg me-1"></i>New Contact
  </a>
</div>

<!-- Search / filter bar -->
<div class="card form-card mb-3">
  <div class="card-body py-2">
    <form class="row g-2 align-items-center"
          hx-get="{% url 'contacts:list' %}"
          hx-target="#contact-table"
          hx-trigger="input delay:300ms from:#q, change from:#type-filter"
          hx-push-url="true">
      <div class="col">
        <input id="q" name="q" type="search" class="form-control form-control-sm"
               placeholder="Search contacts…" value="{{ request.GET.q }}">
      </div>
      <div class="col-auto">
        <select id="type-filter" name="type" class="form-select form-select-sm">
          <option value="">All types</option>
          <option value="CUSTOMER" {% if request.GET.type == 'CUSTOMER' %}selected{% endif %}>Customers</option>
          <option value="VENDOR" {% if request.GET.type == 'VENDOR' %}selected{% endif %}>Vendors</option>
          <option value="BOTH" {% if request.GET.type == 'BOTH' %}selected{% endif %}>Both</option>
        </select>
      </div>
      <div class="col-auto">
        <span class="htmx-indicator spinner-border spinner-border-sm text-primary" role="status"></span>
      </div>
    </form>
  </div>
</div>

<div id="contact-table">
  {% include "contacts/partials/contact_table.html" %}
</div>
{% endblock %}
