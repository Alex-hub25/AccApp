{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{% if object %}Edit {{ object.name }}{% else %}New Contact{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{% if object %}<i class="bi bi-pencil me-2"></i>Edit {{ object.name }}{% else %}<i class="bi bi-person-plus me-2"></i>New Contact{% endif %}</h1>
  <a href="{% url 'contacts:list' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>
<div class="form-card" style="max-width:700px;">
  {% crispy form %}
</div>
{% endblock %}
