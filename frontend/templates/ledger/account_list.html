{% extends "base.html" %}
{% block title %}Chart of Accounts{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-journal-bookmark me-2"></i>Chart of Accounts</h1>
  <a href="{% url 'ledger:account_create' %}" class="btn btn-primary">
    <i class="bi bi-plus-lg me-1"></i>New Account
  </a>
</div>

<div class="card form-card mb-3">
  <div class="card-body py-2">
    <input id="q" name="q" type="search" class="form-control form-control-sm"
           placeholder="Search by code or name…"
           hx-get="{% url 'ledger:account_list' %}"
           hx-target="#account-table"
           hx-trigger="input delay:300ms"
           hx-push-url="true"
           value="{{ request.GET.q }}">
  </div>
</div>

<div id="account-table">
  {% include "ledger/partials/account_table.html" %}
</div>
{% endblock %}
