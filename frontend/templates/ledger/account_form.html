{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{% if object %}Edit Account{% else %}New Account{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{% if object %}<i class="bi bi-pencil me-2"></i>Edit Account{% else %}<i class="bi bi-plus-circle me-2"></i>New Account{% endif %}</h1>
  <a href="{% url 'ledger:account_list' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>
<div class="form-card" style="max-width:650px;">
  {% crispy form %}
</div>
{% endblock %}
